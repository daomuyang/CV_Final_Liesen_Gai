# GPU 服务器（CUDA）推荐环境
# 用法: conda env create -f environment.yml
#       conda activate cv_hw3_task2
name: cv_hw3_task2
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      - torch==2.10.0
      - torchvision==0.25.0
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - -r requirements-server.txt
