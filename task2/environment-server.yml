# 同 environment.yml（环境名：task2）
name: task2
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      - torch==2.10.0
      - torchvision==0.25.0
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - -r requirements-server.txt
